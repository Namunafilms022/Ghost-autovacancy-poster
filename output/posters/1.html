  .layer-overlay {

    background: linear-gradient(180deg, rgba(10,10,30,0.3) 0%, rgba(10,10,30,0.85) 50%, rgba(10,10,30,0.95) 100%);
    z-index: 1;
  }

  .layer-icons {
    position: absolute; inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .layer-icons .di {
    position: absolute;
    font-size: 36px;
    font-weight: 700;
    opacity: 0.08;
    color: var(--accent);
    user-select: none;
    
    text-shadow: 0 0 20px var(--accent); opacity: 0.08;
    
  }

  .layer-text {
    position: relative; z-index: 3;
    background: var(--surface);
    margin: 16px;
    border-radius: var(--radius);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    
  }

  .header {
    background: var(--header-gradient);
    padding: 40px;
    color: #fff;
  }
  .header .company-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .header .company-logo {
    width: 28px; height: 28px; border-radius: 50%;
    object-fit: cover; flex-shrink: 0;
    background: var(--surface-alt);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .header .company-logo.placeholder {
    border: 1px solid rgba(255,255,255,0.25);
  }
  .header .company {
    font-size: 13px; text-transform: uppercase; letter-spacing: 2px;
    opacity: 0.8;
  }
  .header .company-link {
    color: inherit; text-decoration: none;
  }
  .header .company-link:hover {
    text-decoration: underline; opacity: 1;
  }
  .header h1 {
    font-size: 32px; font-weight: 700; line-height: 1.2; margin-bottom: 16px;
  }
  .header .meta { display: flex; flex-wrap: wrap; gap: 12px; }
  .header .meta span {
    background: #1a1a24;
    color: #888899;
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    border: 1px solid #2a2a3a;
  }
  .body { padding: 36px 40px; }
  .section { margin-bottom: 28px; }
  .section h2 {
    font-size: 14px;
    font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid #2a2a3a;
  }
  .salary {
    font-size: 28px; font-weight: 700;
    color: var(--accent);
  }
  .salary small {
    font-size: 14px; font-weight: 400; color: var(--text-secondary);
  }
  .requirements { list-style: none; }
  .requirements li {
    padding: 8px 0 8px 28px; position: relative;
    color: var(--text-primary); font-size: 15px; line-height: 1.5;
  }
  .requirements li::before {
    content: '◆';
    position: absolute; left: 0;
    color: var(--accent); font-weight: 700;
  }
  .benefits { display: flex; flex-wrap: wrap; gap: 8px; }
  .benefits li {
    list-style: none;
    background: var(--surface-alt);
    color: var(--accent);
    padding: 6px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    border: 1px solid #2a2a3a;
  }
  .contact {
    background: var(--surface-alt); border-radius: 12px;
    padding: 20px; border: 1px solid #2a2a3a;
  }
  .contact p { margin-bottom: 6px; font-size: 14px; color: var(--text-secondary); }
  .contact a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .footer {
    text-align: center; padding: 20px 40px;
    font-size: 12px; color: var(--text-secondary);
    border-top: 1px solid #1a1a24;
  }
  .na { color: var(--text-secondary); font-style: italic; opacity: 0.6; }
  @media (max-width: 640px) {
    .header { padding: 24px; }
    .header h1 { font-size: 24px; }
    .body { padding: 24px; }
    .poster { border-radius: 0; }
  }
</style>
</head>
